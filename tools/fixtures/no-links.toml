# FIXTURE — not a working configuration. Rigged copy of the repository's
# cliff.toml whose bullet template omits the commit link, reproducing what the
# built-in default fallback renders: bullets with no links. Guard B must fail
# with "N bullet(s) but 0 commit link(s); expected one per bullet".

[changelog]
header = ""

body = """
{% set repo = "https://github.com/" ~ remote.github.owner ~ "/" ~ remote.github.repo -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{{ commit.message | upper_first }}
{%- endfor %}
{% endfor %}
{% if previous and previous.version and version %}
**Full Changelog**: {{ repo }}/compare/{{ previous.version }}...{{ version }}
{% endif %}
"""

footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
filter_commits = false

commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = ".*", group = "<!-- 8 -->🧹 Misc" },
]

protect_breaking_commits = false
split_commits = false
topo_order = false
sort_commits = "oldest"
