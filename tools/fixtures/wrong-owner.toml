# FIXTURE — not a working configuration. Rigged copy of the repository's
# cliff.toml with the repository URL hardcoded to another owner — the mistake
# the reference config's header warns about (a copied config after a fork or
# rename). Every link renders under the wrong owner; guard B must fail with
# "0/N commit link(s) point at <expected>; the rest point elsewhere".

[changelog]
header = ""

body = """
{% set repo = "https://github.com/other/elsewhere" -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{{ commit.message | upper_first }} \
([{{ commit.id | truncate(length=7, end="") }}]({{ repo }}/commit/{{ commit.id }}))
{%- endfor %}
{% endfor %}
{% if previous and previous.version and version %}
**Full Changelog**: {{ repo }}/compare/{{ previous.version }}...{{ version }}
{% endif %}
"""

footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
filter_commits = false

commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = ".*", group = "<!-- 8 -->🧹 Misc" },
]

protect_breaking_commits = false
split_commits = false
topo_order = false
sort_commits = "oldest"
